  # ----------------------------------------------------------
  # ARTICLES — English-only
  # ----------------------------------------------------------
  - name: articles
    label: "Writing — Articles"
    label_singular: "Article"
    description: "Essays. English-only. Each article is a markdown file with frontmatter."
    icon: article
    folder: "src/content/articles"
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    preview_path: "writing/{{slug}}"
    i18n: false
    summary: "{{title}} · {{category}} · {{date | date('MMM YYYY')}}"
    sortable_fields: [date, title, category, readTime]
    view_filters:
      - { label: "Drafts", field: draft, pattern: true }
      - { label: "Featured", field: featured, pattern: true }
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Deck (subtitle)", name: deck, widget: text }
      - { label: "Category", name: category, widget: select, options: [Distribution, Direct, AI, "AI · Luxury", Channels, Operations, Commercial, Strategy] }
      - { label: "Publish date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: false }
      - { label: "Reading time (minutes)", name: readTime, widget: number, value_type: int, min: 1, max: 60, default: 7 }
      - { label: "Draft", name: draft, widget: boolean, default: false }
      - { label: "Featured on homepage", name: featured, widget: boolean, default: false }
      - { label: "SEO overrides", name: seo, widget: object, collapsed: true, required: false, fields: [
          { label: "SEO Title", name: title, widget: string, required: false },
          { label: "SEO Description", name: description, widget: text, required: false },
          { label: "OG image", name: image, widget: image, required: false }
        ]}
      - { label: "Related articles", name: related, widget: relation, collection: articles, search_fields: [title, deck, category], value_field: "{{slug}}", display_fields: [title], multiple: true, required: false, max: 3 }
      - { label: "Body", name: body, widget: markdown }

  # ----------------------------------------------------------
  # ADVISORY PORTFOLIO — language-neutral data
  # ----------------------------------------------------------
  - name: advisory_portfolio
    label: "Advisory Portfolio"
    label_singular: "Advisory Entry"
    description: "Active advisory positions. Locale-specific descriptions live on the Advisory Page entry."
    icon: stars
    folder: "src/content/advisory"
    create: true
    delete: true
    format: frontmatter
    extension: md
    slug: "{{slug}}"
    i18n: false
    summary: "{{name}} · {{role}} · {{stage}}"
    sortable_fields: [order, name, stage]
    view_filters:
      - { label: "Active", field: active, pattern: true }
      - { label: "Featured", field: featured, pattern: true }
    fields:
      - { label: "Company name", name: name, widget: string }
      - { label: "Role", name: role, widget: select, options: ["Advisory Board", "GTM Strategic Advisor", "Strategic Advisor", "Board Observer", "Founding Advisor"], default: "Advisory Board" }
      - { label: "Stage", name: stage, widget: select, options: ["Pre-seed", "Seed", "Series A", "Series B", "Series C", "Series D", "Growth Stage", "Public", "Other"], default: "Seed" }
      - { label: "Short description", name: description, widget: text, hint: "Used on the homepage card." }
      - { label: "Full description (English)", name: fullDescription, widget: text, hint: "Localized versions live on the Advisory Page entry." }
      - { label: "Formats (English)", name: formats, widget: list, required: false }
      - { label: "Logo", name: logo, widget: image, required: false }
      - { label: "Website URL", name: url, widget: string, pattern: ['^https?://', "Must start with http(s)://"] }
      - { label: "Display order", name: order, widget: number, value_type: int, min: 1, max: 99, default: 1 }
      - { label: "Active", name: active, widget: boolean, default: true }
      - { label: "Featured on homepage", name: featured, widget: boolean, default: true }
      - { label: "Body (unused)", name: body, widget: hidden, default: "" }
