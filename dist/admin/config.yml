# ============================================================
# Rosso Consulting — Sveltia CMS Configuration
# ============================================================
# Sveltia is config-compatible with Decap/Netlify CMS, so this same YAML
# works on either CMS. Sveltia adds a modern editor UI on top.
#
# Editor sign-in: Netlify Identity + Git Gateway.
# Content saves: commit to GitHub via the Netlify Identity proxy.
# ============================================================

backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Content: create {{collection}} "{{slug}}"'
    update: 'Content: update {{collection}} "{{slug}}"'
    delete: 'Content: delete {{collection}} "{{slug}}"'
    uploadMedia: 'Content: upload {{path}}'
    deleteMedia: 'Content: delete {{path}}'

# Media uploads — referenced from any image field
media_folder: "public/uploads"
public_folder: "/uploads"

# Modern UI: instant publish (no draft workflow) — fits a small editor team
publish_mode: simple

# Site URLs (Sveltia uses these for preview pane)
site_url: https://rossoconsulting.ch
display_url: https://rossoconsulting.ch
logo_url: /favicon.svg

# ============================================================
# Internationalization
# ============================================================
# Each locale lives in its own folder under the content tree.
# Editors see locale tabs in the editor for any field marked i18n: true.
# Fields marked `i18n: duplicate` hold the SAME value in every locale —
# editing the value in EN automatically syncs it to IT and ES.
# This is the key to "upload an image once in English and it shows up
# in every other language automatically".
# ============================================================
i18n:
  structure: multiple_folders
  locales: [en, it, es]
  default_locale: en

# ============================================================
# COLLECTIONS
# ============================================================
collections:

  # ----------------------------------------------------------
  # SITE SETTINGS
  # ----------------------------------------------------------
  - name: settings
    label: "Site Settings"
    label_singular: "Setting"
    description: "Global site configuration, navigation, and shared UI strings."
    icon: settings
    i18n: true
    files:

      - name: site
        label: "Site & SEO"
        i18n: true
        file: "src/content/settings/{{locale}}/site.json"
        format: json
        fields:
          - { label: "Site name", name: name, widget: string, i18n: duplicate }
          - { label: "Tagline", name: tagline, widget: string, i18n: true }
          - { label: "Site URL", name: url, widget: string, i18n: duplicate, pattern: ['^https?://', "Must start with http(s)://"] }
          - { label: "Favicon", name: favicon, widget: image, i18n: duplicate, default: "/favicon.svg", hint: "Upload once — auto-shared across all locales." }
          - { label: "Default OG image (1200×630)", name: defaultOgImage, widget: image, i18n: duplicate, required: false, hint: "Fallback social-share image. Upload once — auto-shared across all locales." }
          - { label: "Logo mark", name: logoMark, widget: image, i18n: duplicate, default: "/favicon.svg", hint: "Used in JSON-LD organization schema." }
          - label: "Contact"
            name: contact
            widget: object
            i18n: true
            fields:
              - { label: "Email", name: email, widget: string, i18n: duplicate, pattern: ['^[^@]+@[^@]+\.[^@]+$', "Must be a valid email"] }
              - { label: "LinkedIn URL", name: linkedin, widget: string, i18n: duplicate }
              - { label: "Location (translatable)", name: location, widget: string, i18n: true, hint: "e.g. 'Lugano, Switzerland' / 'Lugano, Svizzera' / 'Lugano, Suiza'." }
          - label: "Social"
            name: social
            widget: object
            i18n: true
            collapsed: true
            fields:
              - { label: "Twitter handle", name: twitter, widget: string, i18n: duplicate, required: false }
          - label: "Principal (Marco)"
            name: principal
            widget: object
            i18n: true
            collapsed: true
            hint: "Used in JSON-LD on every page."
            fields:
              - { label: "Full name", name: fullName, widget: string, i18n: duplicate }
              - { label: "Given name", name: givenName, widget: string, i18n: duplicate }
              - { label: "Family name", name: familyName, widget: string, i18n: duplicate }
              - { label: "Job title (translatable)", name: jobTitle, widget: text, i18n: true }
              - { label: "Alumni of", name: alumniOf, widget: list, i18n: duplicate, default: ["EHL Lausanne", "Cornell University", "Harvard Business School"] }
              - { label: "Known languages", name: knowsLanguage, widget: list, i18n: duplicate, default: ["en", "it", "es"] }
          - label: "Founding location"
            name: founding
            widget: object
            i18n: true
            collapsed: true
            fields:
              - { label: "City", name: addressLocality, widget: string, i18n: duplicate }
              - { label: "Region", name: addressRegion, widget: string, i18n: duplicate }
              - { label: "Country (ISO alpha-2)", name: addressCountry, widget: string, i18n: duplicate, pattern: ['^[A-Z]{2}$', "Two uppercase letters"] }

      - name: navigation
        label: "Navigation & Footer"
        i18n: true
        file: "src/content/settings/{{locale}}/navigation.json"
        format: json
        fields:
          - { label: "Brand text", name: brand, widget: string, i18n: duplicate }
          - label: "Header"
            name: header
            widget: object
            i18n: true
            fields:
              - label: "Nav items"
                name: items
                widget: list
                i18n: true
                fields:
                  - { label: "Label", name: label, widget: string, i18n: true }
                  - { label: "Href", name: href, widget: string, i18n: true, hint: "Localized URL — different per locale." }
                  - { label: "Page key", name: page, widget: string, i18n: duplicate, required: false }
                  - { label: "External", name: external, widget: boolean, i18n: duplicate, default: false, required: false }
              - label: "CTA button"
                name: cta
                widget: object
                i18n: true
                fields:
                  - { label: "Label", name: label, widget: string, i18n: true }
                  - { label: "Href", name: href, widget: string, i18n: true }
                  - { label: "Page key", name: page, widget: string, i18n: duplicate, required: false }
                  - { label: "External", name: external, widget: boolean, i18n: duplicate, default: false, required: false }
          - label: "Footer"
            name: footer
            widget: object
            i18n: true
            fields:
              - { label: "Footer tagline", name: tagline, widget: text, i18n: true }
              - label: "Footer columns"
                name: columns
                widget: list
                i18n: true
                fields:
                  - { label: "Column heading", name: heading, widget: string, i18n: true }
                  - label: "Links"
                    name: links
                    widget: list
                    fields:
                      - { label: "Label", name: label, widget: string, i18n: true }
                      - { label: "Href", name: href, widget: string, i18n: true, required: false }
                      - { label: "External", name: external, widget: boolean, i18n: duplicate, default: false, required: false }
              - { label: "Copyright", name: copyright, widget: string, i18n: duplicate, default: "© {year} Rosso Consulting" }
              - { label: "Bottom line", name: bottom, widget: string, i18n: true }

      - name: ui
        label: "Shared UI Strings"
        i18n: true
        file: "src/content/settings/{{locale}}/ui.json"
        format: json
        fields:
          - label: "Article"
            name: article
            widget: object
            i18n: true
            fields:
              - { label: "'min read' label", name: minRead, widget: string, i18n: true }
              - { label: "'Related writing' heading", name: relatedWriting, widget: string, i18n: true }
              - { label: "'Read article' label", name: readArticle, widget: string, i18n: true }
          - label: "Common"
            name: common
            widget: object
            i18n: true
            fields:
              - { label: "Language label", name: languageLabel, widget: string, i18n: true }
              - { label: "Current role label", name: currentRoleLabel, widget: string, i18n: true }
          - label: "SEO defaults"
            name: seo
            widget: object
            i18n: true
            fields:
              - { label: "Site name (used in OG)", name: siteName, widget: string, i18n: duplicate }
              - { label: "Default description", name: defaultDescription, widget: text, i18n: true }

  # ----------------------------------------------------------
  # PAGES
  # ----------------------------------------------------------
  - name: pages
    label: "Pages"
    label_singular: "Page"
    description: "Page-level content per locale."
    icon: pages
    i18n: true
